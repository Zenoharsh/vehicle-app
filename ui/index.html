<!DOCTYPE html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <title>15th Bn Command</title>
    <script src="js/tailwind.js"></script>
    <link rel="stylesheet" href="css/styles.css" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              army: {
                900: "#1B2418" /* Gunmetal / Very Dark Green */,
                700: "#2E3B29" /* Deep Olive */,
                500: "#4A5D43" /* Standard Olive */,
                100: "#E8F0E6" /* Light Tint */,
              },
              gold: { 500: "#FFD700" },
            },
            fontFamily: {
              sans: ["system-ui", "sans-serif"],
              stencil: ["Impact", "sans-serif"],
              mono: ["Courier New", "Courier", "monospace"],
            },
            boxShadow: {
              hard: "4px 4px 0px 0px rgba(27,36,24,1)" /* Hard tactical shadow */,
            },
          },
        },
      };
    </script>
    <style>
      /* Keep minimal custom CSS for page toggling */
      .page {
        display: none;
      }
      .page.active {
        display: block;
      }
      .cmd-tile {
        cursor: pointer;
        padding: 1rem;
        background: white;
        border: 2px solid #1b2418;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.5rem;
        transition: all 0.15s;
      }
      .cmd-tile:hover {
        background: #e8f0e6;
        transform: translateY(-2px);
        box-shadow: 4px 4px 0px 0px rgba(27, 36, 24, 1);
      }
      .cmd-tile h3 {
        font-family: "Courier New", monospace;
        font-weight: bold;
        text-transform: uppercase;
        font-size: 0.875rem;
      }
    </style>
  </head>
  <body class="h-full flex flex-col font-sans bg-gradient-to-br from-white to-army-100 bg-fixed">
    <nav
      class="bg-gradient-to-r from-army-900 to-black text-white px-8 py-4 flex justify-between items-center border-b-4 border-gold-500 z-20 shadow-lg"
    >
      <div class="flex items-center gap-3">
        <span
          class="h-3 w-3 bg-green-500 animate-pulse border border-black"
        ></span>
        <div
          class="text-xs font-mono text-gray-300 uppercase tracking-widest"
          id="conn-status"
        >
          Initializing...
        </div>
      </div>
      <div class="flex gap-8">
        <button
          onclick="showPage('home')"
          class="text-sm font-bold font-mono uppercase tracking-widest hover:text-gold-500 transition-colors"
        >
          Command Home
        </button>
        <button
          onclick="showPage('vehicles')"
          class="text-sm font-bold font-mono uppercase tracking-widest text-gray-400 hover:text-white transition-colors"
        >
          Fleet Register
        </button>
        <button
          onclick="showPage('settings')"
          class="text-sm font-bold font-mono uppercase tracking-widest text-gray-400 hover:text-white transition-colors"
        >
          Settings
        </button>
      </div>
    </nav>

    
    <main class="flex-1 overflow-y-auto px-6 pb-8 pt-6">
      <div class="mx-auto max-w-7xl">
        <div id="pages-container"></div>
      </div>
    </main>
    <div id="modals-container"></div>


    

    

    

    

    

    

    <script src="js/dashboard.js"></script>
  </body>
</html>
