<div
      id="repair-modal"
      class="fixed inset-0 bg-black/70 hidden items-center justify-center z-50"
    >
      <div
        class="bg-white w-full max-w-md border-4 border-red-800 shadow-hard p-6"
      >
        <h3
          class="text-xl font-bold text-red-800 mb-4 uppercase border-b-2 border-red-200 pb-2 font-mono"
        >
          Report Defect
        </h3>
        <form id="repair-form" class="space-y-4 font-mono">
          <select
            id="r-vehicle-id"
            class="w-full p-2 border-2 border-red-400 focus:border-red-800 outline-none"
            required
          >
            <option value="">Select BA No</option>
          </select>
          <input
            id="r-defect"
            placeholder="Defect Desc"
            class="w-full p-2 border-2 border-red-400 focus:border-red-800 outline-none"
            required
          />
          <select
            id="r-status"
            class="w-full p-2 border-2 border-red-400 outline-none"
          >
            <option value="PENDING">Pending</option>
            <option value="IN_PROGRESS">In Progress</option>
          </select>
          <input
            id="r-date"
            type="date"
            class="w-full p-2 border-2 border-red-400 outline-none"
            required
          />
          <textarea
            id="r-remarks"
            placeholder="Remarks..."
            class="w-full p-2 border-2 border-red-400 outline-none"
            rows="2"
          ></textarea>
          <div class="flex justify-end gap-3 pt-4 border-t-2 border-red-200">
            <button
              type="button"
              onclick="closeModal('repair-modal')"
              class="px-4 py-2 border-2 border-gray-400 uppercase font-bold hover:bg-gray-200"
            >
              Cancel
            </button>
            <button
              type="submit"
              class="px-4 py-2 bg-red-800 text-white border-2 border-red-900 uppercase font-bold hover:bg-red-900"
            >
              Report
            </button>
          </div>
        </form>
      </div>
    </div>
