<div id="repairs-page" class="page">
          <div class="flex justify-between items-center mb-6">
            <h2
              class="text-3xl font-stencil text-red-800 tracking-wide uppercase"
            >
              Active Defects
            </h2>
            <div class="flex gap-3">
              <button
                onclick="openModal('repair-modal')"
                class="bg-red-800 text-white px-4 py-2 border-2 border-red-900 font-mono font-bold uppercase hover:bg-red-900"
              >
                ! Report Defect
              </button>
              <button
                onclick="showPage('home')"
                class="bg-white text-gray-800 px-4 py-2 border-2 border-gray-400 font-mono font-bold uppercase hover:bg-gray-100"
              >
                Back
              </button>
            </div>
          </div>
          <div class="bg-white border-2 border-red-900 shadow-hard">
            <table class="w-full text-left font-mono">
              <thead class="bg-red-900 text-white text-xs uppercase">
                <tr>
                  <th class="px-6 py-4">S.No</th>
                  <th class="px-6 py-4">BA Number</th>
                  <th class="px-6 py-4">Defect</th>
                  <th class="px-6 py-4">Reported On</th>
                  <th class="px-6 py-4">Status</th>
                  <th class="px-6 py-4 text-right">Action</th>
                </tr>
              </thead>
              <tbody
                id="repair-table-body"
                class="divide-y-2 divide-red-200 text-sm bg-red-50"
              ></tbody>
            </table>
          </div>
        </div>
