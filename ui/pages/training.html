<div id="training-page" class="page">
          <div class="flex justify-between items-center mb-6">
            <h2
              class="text-3xl font-stencil text-army-900 tracking-wide uppercase"
            >
              Training Log
            </h2>
            <div class="flex gap-3">
              <button
                onclick="openModal('training-modal')"
                class="bg-army-700 text-white px-4 py-2 border-2 border-army-900 font-mono font-bold uppercase hover:bg-army-900"
              >
                + Add Event
              </button>
              <button
                onclick="showPage('home')"
                class="bg-white text-gray-800 px-4 py-2 border-2 border-gray-400 font-mono font-bold uppercase hover:bg-gray-100"
              >
                Back
              </button>
            </div>
          </div>
          <div class="bg-white border-2 border-army-900 shadow-hard">
            <table class="w-full text-left font-mono">
              <thead class="bg-army-900 text-white text-xs uppercase">
                <tr>
                  <th class="px-6 py-4">S.No</th>
                  <th class="px-6 py-4">Event</th>
                  <th class="px-6 py-4">Category</th>
                  <th class="px-6 py-4">Date</th>
                  <th class="px-6 py-4">Remarks</th>
                </tr>
              </thead>
              <tbody
                id="training-table-body"
                class="divide-y-2 divide-gray-200 text-sm"
              ></tbody>
            </table>
          </div>
        </div>
