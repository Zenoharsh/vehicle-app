<div id="drivers-page" class="page">
          <div class="flex justify-between items-center mb-6">
            <h2
              class="text-3xl font-stencil text-army-900 tracking-wide uppercase"
            >
              Unit Drivers
            </h2>
            <div class="flex gap-3 items-center">
              <select
                id="filter-coy"
                class="border-2 border-gray-400 font-mono px-3 py-2 text-sm uppercase focus:outline-none"
                onchange="loadDrivers()"
              >
                <option value="">All Coys</option>
              </select>
              <select
                id="filter-type"
                class="border-2 border-gray-400 font-mono px-3 py-2 text-sm uppercase focus:outline-none"
                onchange="loadDrivers()"
              >
                <option value="">All Types</option>
              </select>
              <button
                onclick="openModal('driver-modal')"
                class="bg-army-700 text-white px-4 py-2 border-2 border-army-900 font-mono font-bold uppercase hover:bg-army-900"
              >
                + Add Driver
              </button>
              <button
                onclick="showPage('home')"
                class="bg-white text-gray-800 px-4 py-2 border-2 border-gray-400 font-mono font-bold uppercase hover:bg-gray-100"
              >
                Back
              </button>
            </div>
          </div>
          <div class="bg-white border-2 border-army-900 shadow-hard">
            <table class="w-full text-left font-mono">
              <thead class="bg-army-900 text-white text-xs uppercase">
                <tr>
                  <th class="px-6 py-4">S.No</th>
                  <th class="px-6 py-4">Army No</th>
                  <th class="px-6 py-4">Name</th>
                  <th class="px-6 py-4">Coy</th>
                  <th class="px-6 py-4">Veh Type</th>
                  <th class="px-6 py-4">Remarks</th>
                </tr>
              </thead>
              <tbody
                id="driver-table-body"
                class="divide-y-2 divide-gray-200 text-sm"
              ></tbody>
            </table>
          </div>
        </div>
